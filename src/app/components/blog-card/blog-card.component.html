<article class="blog-card" [class.blog-card--featured]="post.featured">
  <div class="blog-card__accent-border"></div>
  <div class="blog-card__content">
    <h2 class="blog-card__title">
      <a [routerLink]="['/posts', post.id]">{{ post.title }}</a>
    </h2>
    <p class="blog-card__excerpt">{{ post.excerpt }}</p>
    <div class="blog-card__meta">
      <div class="blog-card__author">
        <img
          class="blog-card__avatar"
          [src]="post.author.avatarUrl || 'assets/default-avatar.png'"
          [alt]="post.author.name + '\'s avatar'"
          width="32"
          height="32"
        />
        <span class="blog-card__author-name">{{ post.author.name }}</span>
      </div>
      <time class="blog-card__date" [attr.datetime]="post.date">
        {{ post.date | date: 'mediumDate' }}
      </time>
    </div>
    @if (editable) {
      <div class="blog-card__actions">
        <button
          class="blog-card__btn blog-card__btn--edit"
          type="button"
          (click)="onEdit()"
          aria-label="Edit post"
        >
          Edit
        </button>
        <button
          class="blog-card__btn blog-card__btn--delete"
          type="button"
          (click)="onDelete()"
          aria-label="Delete post"
        >
          Delete
        </button>
      </div>
    }
  </div>
</article>
